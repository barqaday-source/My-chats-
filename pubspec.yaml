name: mychats
description: محادثاتي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0
  just_audio: 0.9.36
  record: 5.0.5
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.3.3
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  app_links: ^6.1.0
  flutter_local_notifications: ^17.2.2
  equatable: ^2.0.5
  path: ^1.9.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
