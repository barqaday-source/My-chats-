name: mychats
description: محادثاتي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  app_links: ^6.3.2
  flutter_local_notifications: ^18.0.1
  equatable: ^2.0.5
  path: ^1.9.0
  hive_flutter: ^1.1.0
  just_audio: ^0.9.42
  # الصوت: تسجيل + تشغيل
  audioplayers: ^6.1.0
  flutter_sound: ^9.2.13
  flutter_sound_platform_interface: ^9.2.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
