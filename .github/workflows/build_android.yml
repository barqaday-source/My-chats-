name: Build Android APK - SeaChat
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Configure and Fix Android Project
        run: |
          # توليد أو إصلاح ملفات أندرويد دون المساس بملفات المشروع الأصلية
          flutter create --platforms=android .
          
          # حذف ملف settings.gradle.kts القديم لمنع التعارض إذا وُجد
          rm -f android/settings.gradle.kts
          
          # إعادة كتابة settings.gradle لدعم Kotlin 2.2.0 وتوافق الفلاتر الجديد
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }
              settings.ext.flutterSdkPath = flutterSdkPath()

              includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "2.2.0" apply false
          }

          include ":app"
          EOF

          # ضبط إعدادات build.gradle.kts الخاصة بالتطبيق بدقة وتفعيل الـ Desugaring لجافا 17
          cat > android/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }
          android {
              namespace = "com.seachat.app"
              compileSdk = 35
              ndkVersion = "27.0.12077973"
              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              defaultConfig {
                  applicationId = "com.seachat.app"
                  minSdk = 24
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
          }
          EOF

          # حقن الصلاحيات المطلوبة (الصوت، الكاميرا، الصور) داخل الـ AndroidManifest.xml بشكل آمن
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies
        run: |
          flutter pub pubcache repair || true
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: build/app/outputs/flutter-apk/app-release.apk
