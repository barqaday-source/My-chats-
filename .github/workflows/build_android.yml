name: Build Android APK - SeaChat Pure Auto Fix
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: true
        default: 'release'
        type: choice
        options: [ debug, release ]

jobs:
  build:
    name: Build Android ${{ github.event.inputs.build_type || 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'     

      - name: Prepare Workspace
        run: |
          flutter pub cache clean --force
          flutter clean
          # ننشئ منصة الأندرويد أو نحدث النواقص بشكل آمن دون كسر الـ Plugins
          flutter create --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android Files
        run: |
          # 1. إزالة ملف الـ kts القديم من جذور الأندرويد لمنع تعارض الـ Plugins
          rm -f android/settings.gradle.kts

          # 2. حقن ملف settings.gradle المتوافق تماماً مع Kotlin 2.2.0 وحزم مشروعك
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }
              settings.ext.flutterSdkPath = flutterSdkPath()

              includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "2.2.0" apply false
          }

          include ":app"
          EOF

          # 3. حقن ملف build.gradle.kts الخاص بالتطبيق
          cat > android/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }
          android {
              namespace = "com.seachat.app"
              compileSdk = 35
              ndkVersion = "27.0.12077973"
              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              defaultConfig {
                  applicationId = "com.seachat.app"
                  minSdk = 24
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
          }
          EOF

          # 4. حقن الـ Manifest مع فحص الصلاحيات الناقصة وإضافتها تلقائياً
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # أنشئ Manifest أساسي لو مو موجود
          if [ ! -f "$MANIFEST_PATH" ]; then
            mkdir -p android/app/src/main/
            cat > "$MANIFEST_PATH" << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="SeaChat"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@android:style/Theme.NoTitleBar"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF
          fi

          # دالة تضيف الصلاحية لو مو موجودة
          add_permission() {
            local permission="$1"
            if ! grep -q "$permission" "$MANIFEST_PATH"; then
              sed -i "/<manifest/a \    $permission" "$MANIFEST_PATH"
              echo "Added: $permission"
            fi
          }

          # كل الصلاحيات المطلوبة للتطبيق + flutter_sound + image_picker + url_launcher
          add_permission '<uses-permission android:name="android.permission.INTERNET" />'
          add_permission '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'
          add_permission '<uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />'
          add_permission '<uses-permission android:name="android.permission.RECORD_AUDIO" />'
          add_permission '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />'
          add_permission '<uses-permission android:name="android.permission.CAMERA" />'
          add_permission '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />'
          add_permission '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />'
          add_permission '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />'
          add_permission '<uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />'
          add_permission '<uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />'
          add_permission '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />'
          add_permission '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />'
          add_permission '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />'
          add_permission '<uses-permission android:name="android.permission.WAKE_LOCK" />'

          # تأكد usesCleartextTraffic موجود لـ Supabase
          if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST_PATH"; then
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST_PATH"
          fi

          # 5. إنشاء وحقن الـ MainActivity.kt لتجنب أي نقص في الكود المصدري للأندرويد
          mkdir -p android/app/src/main/kotlin/com/seachat/app/
          cat > android/app/src/main/kotlin/com/seachat/app/MainActivity.kt << 'EOF'
          package com.seachat.app
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {}
          EOF

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == '' }}
        run: flutter build apk --release --target-platform android-arm,android-arm64,android-x64

      - name: Upload Build Artifact APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 14

